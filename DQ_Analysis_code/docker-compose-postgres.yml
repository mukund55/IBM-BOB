version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_dq_test
    environment:
      POSTGRES_USER: dquser
      POSTGRES_PASSWORD: dqpass123
      POSTGRES_DB: dq_database
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./setup_postgres_dq_test.sql:/docker-entrypoint-initdb.d/setup.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dquser -d dq_database"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

